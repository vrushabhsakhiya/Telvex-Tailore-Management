services:
  - type: web
    name: talvex-management
    env: python
    buildCommand: ./build.sh
    startCommand: gunicorn config.wsgi:application --workers 1 --threads 1 --timeout 120 --log-level debug
    healthCheckPath: /heartbeat/
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: taivex
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: .onrender.com,telvex-tailore-management.onrender.com
      - key: SECRET_KEY
        generateValue: true
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings
      - key: PYTHON_UNBUFFERED
        value: "true"

databases:
  - name: taivex
    plan: free
    databaseName: taivex
    user: taivexuser
