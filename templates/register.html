{% extends "auth_base.html" %}

{% block title %}Sign Up{% endblock %}

{% block content %}
<div class="form-header">
    <h1 class="auth-title">Create Account</h1>
    <p class="auth-subtitle">Join the elite network of professional tailors.</p>
</div>

<form action="{% url 'register' %}" method="POST">
    {% csrf_token %}
    
    <!-- Honeypot field (hidden from humans, bots will fill it) -->
    <div style="display:none !important;" aria-hidden="true" tabindex="-1">
        <label for="honeypot_website">Keep this field empty</label>
        <input type="text" id="honeypot_website" name="website" autocomplete="off" tabindex="-1">
    </div>

    <div class="form-grid">
        <div class="form-group">
            <label for="owner_name" class="form-label">Owner Full Name</label>
            <input type="text" id="owner_name" name="owner_name" class="form-input" placeholder="e.g. John Doe" required>
        </div>

        <div class="form-group">
            <label for="shop_name" class="form-label">Shop Name</label>
            <input type="text" id="shop_name" name="shop_name" class="form-input" placeholder="e.g. Royal Tailors" required>
        </div>
    </div>

    <div class="form-grid">
        <div class="form-group">
            <label for="mobile" class="form-label">Mobile Number</label>
            <input type="tel" id="mobile" name="mobile" class="form-input" placeholder="e.g. +91 9876543210" required>
        </div>

        <div class="form-group">
            <label for="email" class="form-label">Email Address</label>
            <input type="email" id="email" name="email" class="form-input" placeholder="shop@example.com" required>
        </div>
    </div>

    <div class="form-grid">
        <div class="form-group">
            <label for="address" class="form-label">Shop Address (Optional)</label>
            <input type="text" id="address" name="address" class="form-input" placeholder="Enter shop address" rows="1">
        </div>

        <div class="form-group">
            <label for="gst_no" class="form-label">GST Number (Optional)</label>
            <input type="text" id="gst_no" name="gst_no" class="form-input" placeholder="e.g. 27AAPFU0939F1ZV">
        </div>
    </div>

    <div class="form-grid">
        <div class="form-group">
            <label for="password" class="form-label">Password</label>
            <input type="password" id="password" name="password" class="form-input" placeholder="Min. 8 characters" required
                minlength="8">
            <div id="password-strength-container" style="margin-top: 8px; display: none;">
                <div style="height: 4px; width: 100%; background: #e2e8f0; border-radius: 2px; overflow: hidden;">
                    <div id="strength-bar" style="height: 100%; width: 0; transition: all 0.3s ease;"></div>
                </div>
                <ul id="password-rules" style="list-style: none; padding: 0; margin-top: 8px; font-size: 12px; color: var(--slate-500);">
                    <li id="rule-length" style="display: flex; align-items: center; gap: 4px;"><i class="fa-regular fa-circle"></i> At least 8 characters</li>
                    <li id="rule-number" style="display: flex; align-items: center; gap: 4px;"><i class="fa-regular fa-circle"></i> One number</li>
                    <li id="rule-symbol" style="display: flex; align-items: center; gap: 4px;"><i class="fa-regular fa-circle"></i> One special character</li>
                </ul>
            </div>
            <script>
                document.getElementById('password').addEventListener('input', function(e) {
                    const pass = e.target.value;
                    const container = document.getElementById('password-strength-container');
                    const bar = document.getElementById('strength-bar');
                    const rules = {
                        length: pass.length >= 8,
                        number: /[0-9]/.test(pass),
                        symbol: /[^A-Za-z0-9]/.test(pass)
                    };

                    container.style.display = pass ? 'block' : 'none';

                    // Update Rules UI
                    Object.keys(rules).forEach(rule => {
                        const el = document.getElementById('rule-' + rule);
                        const icon = el.querySelector('i');
                        if (rules[rule]) {
                            el.style.color = '#10B981';
                            icon.className = 'fa-solid fa-circle-check';
                        } else {
                            el.style.color = '#94a3b8';
                            icon.className = 'fa-regular fa-circle';
                        }
                    });

                    // Update Bar
                    const score = Object.values(rules).filter(Boolean).length;
                    const colors = ['#EF4444', '#F59E0B', '#3B82F6', '#10B981'];
                    bar.style.width = (score / 3 * 100) + '%';
                    bar.style.backgroundColor = colors[score];
                });
            </script>
        </div>

        <div class="form-group">
            <label for="confirm_password" class="form-label">Confirm Password</label>
            <input type="password" id="confirm_password" name="confirm_password" class="form-input"
                placeholder="Repeat Password" required minlength="8">
        </div>
    </div>

    <div class="form-group" style="margin: 0.75rem 0; display: flex; align-items: center; gap: 0.5rem;">
        <input type="checkbox" id="terms" name="terms" required style="width: auto; cursor: pointer;">
        <label for="terms" class="form-label" style="margin-bottom: 0; cursor: pointer;">
            I agree to the <a href="#" style="color: var(--primary-color);">Terms of Service</a> and <a href="#" style="color: var(--primary-color);">Privacy Policy</a>
        </label>
    </div>

    <div class="form-group" style="margin: 0.75rem 0;">
        <script src="https://www.google.com/recaptcha/api.js" async defer></script>
        <div class="g-recaptcha" data-sitekey="{{ RECAPTCHA_PUBLIC_KEY }}" data-size="compact"></div>
    </div>

    <button type="submit" class="btn btn-primary" style="margin-top: 0.5rem; width: 100%; justify-content: center;">
        Register Shop & Create Account
    </button>
</form>

<div class="auth-footer">
    Already have a shop account? <a href="{% url 'login' %}">Sign in</a>
</div>
{% endblock %}
