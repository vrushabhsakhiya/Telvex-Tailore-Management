{% extends "auth_base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="form-header">
    <h1 class="auth-title">Welcome Back</h1>
    <p class="auth-subtitle">Manage your tailoring shop from anywhere.</p>
</div>

<form action="{% url 'login' %}" method="POST">
    {% csrf_token %}

    <div class="form-group">
        <label for="email" class="form-label">Email Address</label>
        <input type="email" id="email" name="username" class="form-input" placeholder="shop@example.com" required>
    </div>

    <div class="form-group">
        <label for="password" class="form-label">Password</label>
        <input type="password" id="password" name="password" class="form-input" placeholder="••••••••" required>
        <div style="text-align: right; margin-top: 0.5rem;">
            <a href="{% url 'forgot_password' %}" style="font-size: 0.75rem; color: var(--primary); text-decoration: none;">Forgot password?</a>
        </div>
    </div>

    <div class="form-group" style="margin: 1.5rem 0;">
        <script src="https://www.google.com/recaptcha/api.js" async defer></script>
        <div class="g-recaptcha" data-sitekey="{{ RECAPTCHA_PUBLIC_KEY }}"></div>
    </div>

    <button type="submit" class="btn btn-primary">
        Sign In <i class="fa-solid fa-arrow-right" style="margin-left: 0.5rem;"></i>
    </button>
</form>

<div class="auth-footer">
    New here? <a href="{% url 'register' %}">Register your shop</a><br>
    Are you a staff member? <a href="{% url 'staff_login' %}">Staff Login</a>
</div>
{% endblock %}
