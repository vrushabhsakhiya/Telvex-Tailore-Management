{% extends "auth_base.html" %}

{% block title %}New Password{% endblock %}

{% block content %}
<h2 style="font-size: 1.25rem; font-weight: 600; margin-bottom: 1.5rem; text-align: center;">Set new password</h2>

<form action="{% url 'reset_password' %}" method="POST">
    {% csrf_token %}

    <div class="form-group">
        <label for="otp" class="form-label">Verification Code</label>
        <input type="text" id="otp" name="otp" class="form-input" placeholder="Enter code from email" required>
    </div>

    <div class="form-group">
        <label for="password" class="form-label">New Password</label>
        <input type="password" id="password" name="password" class="form-input" placeholder="Min. 8 characters" required
            minlength="8">
        <div id="password-strength-container" style="margin-top: 8px; display: none;">
            <div style="height: 4px; width: 100%; background: #e2e8f0; border-radius: 2px; overflow: hidden;">
                <div id="strength-bar" style="height: 100%; width: 0; transition: all 0.3s ease;"></div>
            </div>
            <ul id="password-rules" style="list-style: none; padding: 0; margin-top: 8px; font-size: 11px; color: var(--slate-500);">
                <li id="rule-length" style="display: flex; align-items: center; gap: 4px;"><i class="fa-regular fa-circle"></i> At least 8 characters</li>
                <li id="rule-number" style="display: flex; align-items: center; gap: 4px;"><i class="fa-regular fa-circle"></i> One number</li>
                <li id="rule-symbol" style="display: flex; align-items: center; gap: 4px;"><i class="fa-regular fa-circle"></i> One special character</li>
            </ul>
        </div>
        <script>
            document.getElementById('password').addEventListener('input', function(e) {
                const pass = e.target.value;
                const container = document.getElementById('password-strength-container');
                const bar = document.getElementById('strength-bar');
                const rules = {
                    length: pass.length >= 8,
                    number: /\d/.test(pass),
                    symbol: /[^A-Za-z0-9]/.test(pass)
                };

                container.style.display = pass ? 'block' : 'none';

                Object.keys(rules).forEach(rule => {
                    const el = document.getElementById('rule-' + rule);
                    const icon = el.querySelector('i');
                    if (rules[rule]) {
                        el.style.color = '#10B981';
                        icon.className = 'fa-solid fa-circle-check';
                    } else {
                        el.style.color = '#94a3b8';
                        icon.className = 'fa-regular fa-circle';
                    }
                });

                const score = Object.values(rules).filter(Boolean).length;
                const colors = ['#EF4444', '#F59E0B', '#3B82F6', '#10B981'];
                bar.style.width = (score / 3 * 100) + '%';
                bar.style.backgroundColor = colors[score];
            });
        </script>
    </div>

    <div class="form-group">
        <label for="confirm_password" class="form-label">Confirm Password</label>
        <input type="password" id="confirm_password" name="confirm_password" class="form-input"
            placeholder="Repeat new password" required minlength="8">
    </div>

    <button type="submit" class="btn btn-primary">
        Reset Password
    </button>
</form>

<div class="auth-footer">
    <a href="{% url 'login' %}">Back to Login</a>
</div>
{% endblock %}
